<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="مكتبة محتوى د. رامي الموجي - الجانب النفسي لتقويم الأسنان">
  <title>مكتبة المحتوى | د. رامي الموجي</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap');
    :root {
      --bg-primary: #0f172a; --bg-secondary: #1e293b; --bg-tertiary: #334155;
      --bg-card: #1e293b; --bg-hover: #27354f; --text-primary: #f1f5f9;
      --text-secondary: #94a3b8; --text-muted: #64748b; --accent: #3b82f6;
      --accent-light: #60a5fa; --accent-dark: #2563eb; --success: #10b981;
      --warning: #f59e0b; --danger: #ef4444; --border: #334155;
      --shadow: rgba(0,0,0,0.4); --radius-sm: 8px; --radius-md: 12px;
      --radius-lg: 16px; --radius-xl: 20px;
      --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    [data-theme="light"] {
      --bg-primary: #f8fafc; --bg-secondary: #ffffff; --bg-tertiary: #f1f5f9;
      --bg-card: #ffffff; --bg-hover: #f1f5f9; --text-primary: #0f172a;
      --text-secondary: #475569; --text-muted: #94a3b8; --border: #e2e8f0;
      --shadow: rgba(0,0,0,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Cairo', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary); color: var(--text-primary);
      min-height: 100vh; min-height: 100dvh; overflow-x: hidden;
      line-height: 1.6; -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
    .animate-slideUp { animation: slideUp 0.3s ease-out; }
    .app-container { max-width: 1200px; margin: 0 auto; padding: 16px; padding-top: calc(16px + var(--safe-top)); padding-bottom: calc(80px + var(--safe-bottom)); }
    .header {
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 50%, #3b82f6 100%);
      border-radius: var(--radius-lg); padding: 24px 20px; margin-bottom: 20px;
      position: relative; overflow: hidden; box-shadow: 0 8px 32px rgba(37, 99, 235, 0.3);
    }
    .header::before { content: ''; position: absolute; top: -50%; right: -20%; width: 300px; height: 300px; background: rgba(255,255,255,0.05); border-radius: 50%; }
    .header-title { font-size: clamp(20px, 5vw, 28px); font-weight: 800; margin-bottom: 4px; position: relative; }
    .header-subtitle { font-size: 13px; opacity: 0.85; position: relative; }
    .header-stats { display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap; }
    .stat-box { text-align: center; min-width: 60px; }
    .stat-number { font-size: 28px; font-weight: 800; line-height: 1; }
    .stat-label { font-size: 11px; opacity: 0.8; margin-top: 4px; }
    .save-indicator { margin-top: 12px; font-size: 12px; opacity: 0.9; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .card {
      background: var(--bg-card); border-radius: var(--radius-md); padding: 16px;
      margin-bottom: 12px; border: 1px solid var(--border);
      box-shadow: 0 2px 8px var(--shadow); transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:active { transform: scale(0.98); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 12px 20px; min-height: 48px; border-radius: var(--radius-sm);
      border: none; font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; white-space: nowrap; touch-action: manipulation;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:active { background: var(--accent-dark); transform: scale(0.97); }
    .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
    .btn-ghost { background: transparent; color: var(--text-secondary); }
    .btn-sm { padding: 8px 14px; min-height: 36px; font-size: 12px; }
    .btn-icon { width: 44px; height: 44px; padding: 0; border-radius: 50%; }
    .input {
      width: 100%; padding: 12px 16px; min-height: 48px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border); background: var(--bg-primary); color: var(--text-primary);
      font-family: inherit; font-size: 16px; outline: none; transition: border-color 0.2s; -webkit-appearance: none;
    }
    .input:focus { border-color: var(--accent); }
    .input::placeholder { color: var(--text-muted); }
    .input-error { border-color: var(--danger) !important; }
    textarea.input { min-height: 80px; resize: vertical; line-height: 1.6; }
    select.input { cursor: pointer; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; min-height: 36px; border-radius: 20px;
      border: 1.5px solid var(--border); background: var(--bg-card);
      color: var(--text-secondary); font-family: inherit; font-size: 13px;
      cursor: pointer; transition: all 0.2s; touch-action: manipulation;
    }
    .chip.active { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); color: var(--accent); font-weight: 700; }
    .chip-count { background: var(--bg-tertiary); padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; }
    .chip.active .chip-count { background: var(--accent); color: white; }
    .topic-card {
      background: var(--bg-card); border-radius: var(--radius-md);
      border: 1px solid var(--border); margin-bottom: 10px;
      overflow: hidden; transition: all 0.2s; cursor: pointer;
    }
    .topic-card:hover { border-color: var(--accent); }
    .topic-header { padding: 16px; display: flex; align-items: flex-start; gap: 12px; }
    .topic-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
    .topic-number { min-width: 32px; height: 32px; border-radius: 8px; background: var(--bg-tertiary); color: var(--text-muted); font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .topic-title { font-size: 15px; font-weight: 700; color: var(--text-primary); line-height: 1.5; flex: 1; }
    .topic-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .badge-status-published { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
    .badge-status-scheduled { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
    .badge-status-idea { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
    .badge-priority-high { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
    .badge-priority-medium { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
    .badge-priority-low { background: var(--bg-tertiary); color: var(--text-muted); border: 1px solid var(--border); }
    .badge-category { background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border); }
    .badge-platform { background: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
    .topic-expanded { padding: 0 16px 16px; border-top: 1px solid var(--border); }
    .topic-notes { margin: 14px 0; padding: 14px; background: var(--bg-primary); border-radius: var(--radius-sm); border-right: 3px solid var(--accent); }
    .topic-notes-label { font-size: 11px; color: var(--text-muted); font-weight: 700; margin-bottom: 6px; }
    .topic-notes-text { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
    .topic-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 1000; padding: 0; backdrop-filter: blur(4px);
    }
    .modal-content {
      background: var(--bg-card); border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      padding: 24px 20px; width: 100%; max-width: 600px;
      max-height: 92vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
      animation: slideUp 0.3s ease-out;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-title { font-size: 20px; font-weight: 800; }
    .modal-close { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-tertiary); color: var(--text-muted); border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .form-group { margin-bottom: 18px; }
    .form-label { font-size: 13px; font-weight: 700; color: var(--text-secondary); display: block; margin-bottom: 8px; }
    .form-error { font-size: 12px; color: var(--danger); margin-top: 6px; font-weight: 600; }
    .platform-grid { display: flex; gap: 8px; flex-wrap: wrap; }
    .platform-btn { flex: 1; min-width: 70px; min-height: 44px; padding: 8px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg-card); color: var(--text-secondary); font-family: inherit; font-size: 13px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .platform-btn.active { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); color: var(--accent); font-weight: 700; }
    .priority-grid { display: flex; gap: 8px; flex-wrap: wrap; }
    .priority-btn { flex: 1; min-width: 80px; min-height: 44px; padding: 8px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg-card); color: var(--text-secondary); font-family: inherit; font-size: 13px; cursor: pointer; transition: all 0.2s; font-weight: 600; }
    .priority-btn.active-high { border-color: rgba(239, 68, 68, 0.5); background: rgba(239, 68, 68, 0.1); color: #f87171; }
    .priority-btn.active-medium { border-color: rgba(245, 158, 11, 0.5); background: rgba(245, 158, 11, 0.1); color: #fbbf24; }
    .priority-btn.active-low { border-color: var(--border); background: var(--bg-tertiary); color: var(--text-muted); }
    .fab {
      position: fixed; bottom: calc(24px + var(--safe-bottom)); left: 24px;
      width: 60px; height: 60px; border-radius: 50%;
      background: linear-gradient(135deg, #2563eb, #3b82f6); color: white;
      border: none; font-size: 28px; cursor: pointer;
      box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; transition: transform 0.2s;
    }
    .fab:active { transform: scale(0.92); }
    .empty-state { text-align: center; padding: 60px 24px; }
    .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
    .empty-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; color: var(--text-secondary); }
    .empty-text { font-size: 14px; color: var(--text-muted); }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .search-box { position: relative; flex: 1; min-width: 200px; }
    .search-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; }
    .search-box input { padding-right: 42px; }
    .filter-section { margin-bottom: 10px; }
    .filter-label { font-size: 12px; color: var(--text-muted); font-weight: 700; margin-bottom: 8px; display: block; }
    .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .results-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 13px; color: var(--text-muted); font-weight: 600; }
    .data-actions { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .ai-btn { padding: 8px 14px; border-radius: var(--radius-sm); background: linear-gradient(135deg, #7c3aed, #a855f7); color: white; border: none; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
    .ai-btn:active { opacity: 0.9; transform: scale(0.97); }
    .toast {
      position: fixed; bottom: calc(100px + var(--safe-bottom)); left: 50%; transform: translateX(-50%);
      background: var(--bg-secondary); color: var(--text-primary);
      padding: 14px 24px; border-radius: var(--radius-lg);
      border: 1px solid var(--border); box-shadow: 0 8px 32px var(--shadow);
      z-index: 2000; font-weight: 700; font-size: 14px;
      display: flex; align-items: center; gap: 8px;
      animation: fadeIn 0.3s ease-out;
    }
    .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1100; padding: 24px; }
    .confirm-box { background: var(--bg-card); border-radius: var(--radius-lg); padding: 24px; max-width: 360px; width: 100%; border: 1px solid var(--border); }
    .confirm-title { font-size: 18px; font-weight: 800; margin-bottom: 12px; }
    .confirm-text { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.6; }
    .confirm-actions { display: flex; gap: 10px; }
    .file-input { display: none; }
    .detail-field { margin-bottom: 10px; }
    .detail-label { font-size: 11px; color: var(--text-muted); font-weight: 700; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-value { font-size: 13px; color: var(--text-primary); line-height: 1.6; }
    .detail-value-empty { font-size: 13px; color: var(--text-muted); font-style: italic; }
    .tag-list { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .tag { padding: 3px 10px; border-radius: 20px; background: var(--bg-tertiary); color: var(--text-secondary); font-size: 11px; font-weight: 600; }
    .tag-input-row { display: flex; gap: 8px; margin-top: 8px; }
    .tag-input-row input { flex: 1; }
    .tag-input-row button { min-height: 40px; padding: 8px 16px; }
    .tag-item { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; background: var(--bg-tertiary); color: var(--text-secondary); font-size: 12px; font-weight: 600; margin: 4px; }
    .tag-item button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 0 2px; }
    
    /* Subtopic Styles */
    .subtopic-card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .subtopic-card:hover {
      border-color: var(--accent);
      transform: translateX(-4px);
    }
    .subtopic-number {
      min-width: 28px;
      height: 28px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .subtopic-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.4;
      flex: 1;
    }
    .subtopic-meta {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .subtopic-badge {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }

@media (min-width: 768px) {
      .app-container { padding: 24px; }
      .modal-overlay { align-items: center; padding: 24px; }
      .modal-content { border-radius: var(--radius-xl); max-height: 85vh; }
      .header { padding: 32px; }
      .topic-header { padding: 20px; }
      .fab { display: none; }
    }
    @media (max-width: 767px) { 
      .desktop-only { display: none !important; }

      /* Larger touch targets */
      .btn { min-height: 44px; padding: 12px 16px; }
      .btn-sm { min-height: 40px; padding: 10px 14px; font-size: 13px; }
      .chip { padding: 10px 16px; min-height: 40px; font-size: 14px; }

      /* Category tabs */
      .category-tabs { 
        gap: 8px !important; 
        padding: 6px 4px !important;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
      }
      .category-tabs::-webkit-scrollbar { display: none; }
      .category-tab { 
        min-width: 100px !important; 
        max-width: 140px;
        padding: 10px 14px !important; 
        font-size: 13px !important;
        scroll-snap-align: start;
        flex-shrink: 0;
      }
      .category-tab span:first-child { font-size: 20px !important; margin-bottom: 2px !important; }

      /* Header */
      .header { padding: 16px 14px; }
      .header-title { font-size: 20px; }
      .header-stats { gap: 12px; margin-top: 12px; }
      .stat-number { font-size: 22px; }
      .stat-label { font-size: 10px; }

      /* App container */
      .app-container { padding: 12px; padding-top: calc(12px + var(--safe-top)); }

      /* Topic cards */
      .topic-card { margin-bottom: 8px; border-radius: var(--radius-sm); }
      .topic-header { 
        padding: 12px; 
        gap: 8px;
        flex-direction: column !important;
        align-items: stretch !important;
      }
      .topic-meta-row { width: 100%; }
      .topic-title-row { width: 100%; }
      .topic-title { 
        font-size: 16px !important; 
        line-height: 1.7 !important;
      }
      .topic-header-badges { width: 100%; }
      .topic-dot { margin-top: 0; }
      .topic-number { min-width: 28px; height: 28px; font-size: 11px; }
      .drag-handle { order: 0; }

      .topic-header-main {
        width: 100%;
        flex-wrap: wrap;
      }
      .topic-header-badges {
        width: 100%;
        justify-content: flex-start;
        flex-wrap: wrap;
      }
      .topic-title { 
        font-size: 16px !important; 
        line-height: 1.7 !important;
        width: 100%;
        order: 5;
      }
      .topic-dot { margin-top: 6px; }
      .topic-number { min-width: 30px; height: 30px; font-size: 12px; }
      .drag-handle { order: 0; }

      .topic-title { font-size: 14px; line-height: 1.5; }
      .topic-number { min-width: 28px; height: 28px; font-size: 11px; }
      .topic-dot { width: 8px; height: 8px; margin-top: 4px; }
      .topic-badges { gap: 4px; margin-top: 6px; }
      .badge { padding: 3px 10px; font-size: 10px; }

      /* Expanded */
      .topic-expanded { padding: 0 12px 12px; }
      .topic-notes { padding: 12px; margin: 10px 0; }
      .topic-notes-text { font-size: 13px; }
      .detail-field { margin-bottom: 8px; }
      .detail-value { font-size: 13px; }

      /* Actions - scrollable row */
      .topic-actions { 
        gap: 6px; 
        margin-top: 10px;
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 4px;
        -webkit-overflow-scrolling: touch;
      }
      .topic-actions::-webkit-scrollbar { display: none; }
      .topic-actions .btn { white-space: nowrap; font-size: 12px; padding: 8px 12px; min-height: 36px; }

      /* Toolbar */
      .toolbar { gap: 8px; margin-bottom: 12px; }
      .search-box { min-width: 0; flex: 1; }
      .search-box input { font-size: 15px; padding-right: 40px; }

      /* Data actions */
      .data-actions { 
        gap: 6px; 
        margin-bottom: 12px;
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 4px;
        -webkit-overflow-scrolling: touch;
      }
      .data-actions::-webkit-scrollbar { display: none; }
      .data-actions .btn { white-space: nowrap; font-size: 12px; padding: 8px 12px; }

      /* Card */
      .card { padding: 12px; margin-bottom: 10px; }

      /* FAB */
      .fab { 
        width: 56px; height: 56px; 
        font-size: 28px;
        bottom: calc(20px + var(--safe-bottom));
        left: 20px;
      }

      /* Modal */
      .modal-overlay { padding: 0; align-items: flex-end; }
      .modal-content { 
        border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        padding: 20px 16px;
        max-height: 95vh;
      }
      .modal-header { margin-bottom: 20px; }
      .modal-title { font-size: 18px; }

      /* Inputs */
      .input { min-height: 48px; font-size: 16px; padding: 12px 14px; }
      textarea.input { min-height: 80px; }
      select.input { min-height: 48px; }

      /* Filters */
      .filter-section { margin-bottom: 8px; }
      .filter-chips { gap: 6px; }

      /* Grids */
      .platform-grid, .priority-grid { gap: 6px; }
      .platform-btn, .priority-btn { min-height: 44px; font-size: 13px; }

      /* Results */
      .results-bar { font-size: 12px; margin-bottom: 10px; }

      /* Empty state */
      .empty-state { padding: 40px 20px; }
      .empty-icon { font-size: 48px; }
      .empty-title { font-size: 16px; }

      /* Reorder hint */
      

      /* Drag handle - bigger for touch */
      .drag-handle { 
        width: 36px !important; 
        height: 36px !important; 
        font-size: 18px !important;
        display: flex !important;
        align-items: center;
        justify-content: center;

    localStorage.setItem("dr-ramy-gist-token", token.trim());
    setStatus("idle");
    setMessage("Token saved ✅");
    setTimeout(() => setMessage(""), 2000);
  };

  const clearToken = () => {
    setToken("");
    window.__DR_RAMY_SYNC__.token = "";
    localStorage.removeItem("dr-ramy-gist-token");
    setMessage("Token cleared");
    setTimeout(() => setMessage(""), 2000);
  };

  const pushToGist = async () => {
    const t = window.__DR_RAMY_SYNC__.token.trim();
    if (!t) {
      setStatus("error");
      setMessage("Add GitHub token first!");
      return;
    }
    setStatus("syncing");
    setMessage("Pushing to Gist...");
    try {
      const payload = {
        app: "Dr-Ramy-Content-Library",
        version: "7.0",
        libraryVersion: window.__DR_RAMY_CURRENT_VERSION__ || 1,
        lastUpdated: new Date().toISOString(),
        exportedAt: new Date().toISOString(),
        topics: topics
      };
      const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
        method: "PATCH",
        headers: {
          "Authorization": `token ${t}`,
          "Accept": "application/vnd.github.v3+json",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          files: {
            [GIST_FILENAME]: {
              content: JSON.stringify(payload, null, 2)
            }
          }
        })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `HTTP ${res.status}`);
      }
      const now = new Date().toISOString();
      window.__DR_RAMY_SYNC__.lastSyncTime = now;
      localStorage.setItem("dr-ramy-last-sync", now);
      setLastSync(now);
      setStatus("success");
      setMessage("Uploaded to Gist ✅");
      setTimeout(() => setMessage(""), 3000);
    } catch (e) {
      setStatus("error");
      setMessage("Push failed: " + e.message);
    }
  };

  const pullFromGist = async () => {
    const t = window.__DR_RAMY_SYNC__.token.trim();
    if (!t) {
      setStatus("error");
      setMessage("Add GitHub token first!");
      return;
    }
    setStatus("syncing");
    setMessage("Pulling from Gist...");
    try {
      const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
        headers: {
          "Authorization": `token ${t}`,
          "Accept": "application/vnd.github.v3+json"
        }
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `HTTP ${res.status}`);
      }
      const gist = await res.json();
      const file = gist.files && gist.files[GIST_FILENAME];
      if (!file) throw new Error("File not found in Gist");
      const content = file.content;
      const data = JSON.parse(content);
      if (!data.topics || !Array.isArray(data.topics)) throw new Error("Invalid data format");

      // Ask for confirmation if local data exists
      const saved = storage.get(STORAGE_KEY);
      if (saved && saved.length > 0) {
        if (!window.confirm(`Gist has ${data.topics.length} topics. Replace your local ${saved.length} topics?`)) {
          setStatus("idle");
          setMessage("Cancelled");
          return;
        }
      }

      onSyncPull(data.topics);
      const now = new Date().toISOString();
      window.__DR_RAMY_SYNC__.lastSyncTime = now;
      localStorage.setItem("dr-ramy-last-sync", now);
      setLastSync(now);
      setStatus("success");
      setMessage(`Pulled ${data.topics.length} topics ✅`);
      setTimeout(() => setMessage(""), 3000);
    } catch (e) {
      setStatus("error");
      setMessage("Pull failed: " + e.message);
    }
  };

  const statusIcon = {
    idle: "☁️",
    syncing: "⏳",
    success: "✅",
    error: "❌"
  }[status] || "☁️";

  return (
    <>
      <button
        onClick={() => setShowPanel(!showPanel)}
        style={{
          position: "fixed",
          top: "calc(12px + var(--safe-top))",
          left: "12px",
          zIndex: 1000,
          width: "44px",
          height: "44px",
          borderRadius: "50%",
          border: "none",
          background: status === "error" ? "var(--danger)" : status === "success" ? "var(--success)" : "var(--accent)",
          color: "white",
          fontSize: 20,
          cursor: "pointer",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          boxShadow: "0 4px 16px rgba(0,0,0,0.3)",
          transition: "all 0.2s"
        }}
        title="Gist Sync"
      >
        {status === "syncing" ? (
          <span style={{ animation: "spin 1s linear infinite", display: "inline-block" }}>↻</span>
        ) : (
          "🔄"
        )}
      </button>

      {showPanel && (
        <div className="modal-overlay" onClick={() => setShowPanel(false)}>
          <div className="modal-content" onClick={e => e.stopPropagation()} style={{ maxWidth: 480 }}>
            <div className="modal-header">
              <h2 className="modal-title">🔄 Gist Cloud Sync</h2>
              <button className="modal-close" onClick={() => setShowPanel(false)}>✕</button>
            </div>

            <div style={{ marginBottom: 16, padding: 12, background: "var(--bg-primary)", borderRadius: 8, border: "1px solid var(--border)" }}>
              <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 6 }}>Gist ID</div>
              <div style={{ fontSize: 14, fontFamily: "monospace", color: "var(--accent-light)", direction: "ltr", textAlign: "left" }}>
                {GIST_ID}
              </div>
            </div>

            <div className="form-group">
              <label className="form-label">GitHub Personal Access Token</label>
              <input
                type="password"
                className="input"
                value={token}
                onChange={e => setToken(e.target.value)}
                placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
                style={{ direction: "ltr", textAlign: "left", fontFamily: "monospace" }}
              />
              <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 6 }}>
                Create token at github.com/settings/tokens with <strong>gist</strong> scope only.
                Token is saved locally in your browser.
              </div>
            </div>

            <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
              <button className="btn btn-primary btn-sm" onClick={saveToken} style={{ flex: 1 }}>
                💾 Save Token
              </button>
              <button className="btn btn-ghost btn-sm" onClick={clearToken}>
                🗑️ Clear
              </button>
            </div>

            {message && (
              <div style={{
                padding: "10px 14px",
                borderRadius: 8,
                background: status === "error" ? "rgba(239,68,68,0.1)" : status === "success" ? "rgba(16,185,129,0.1)" : "var(--bg-primary)",
                color: status === "error" ? "var(--danger)" : status === "success" ? "var(--success)" : "var(--text-secondary)",
                fontSize: 13,
                fontWeight: 600,
                marginBottom: 16,
                border: `1px solid ${status === "error" ? "rgba(239,68,68,0.3)" : status === "success" ? "rgba(16,185,129,0.3)" : "var(--border)"}`
              }}>
                {statusIcon} {message}
              </div>
            )}

            {lastSync && (
              <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 16 }}>
                🕐 Last sync: {new Date(lastSync).toLocaleString('ar-EG')}
              </div>
            )}

            <div style={{ display: "flex", gap: 10 }}>
              <button
                className="btn btn-primary"
                style={{ flex: 1 }}
                onClick={pushToGist}
                disabled={status === "syncing"}
              >
                ⬆️ Push to Gist
                <div style={{ fontSize: 11, opacity: 0.8, fontWeight: 400 }}>{topics.length} topics</div>
              </button>
              <button
                className="btn btn-secondary"
                style={{ flex: 1 }}
                onClick={pullFromGist}
                disabled={status === "syncing"}
              >
                ⬇️ Pull from Gist
                <div style={{ fontSize: 11, opacity: 0.8, fontWeight: 400 }}>Replace local</div>
              </button>
            </div>

            <div style={{ marginTop: 16, padding: 12, background: "rgba(245,158,11,0.08)", borderRadius: 8, border: "1px solid rgba(245,158,11,0.2)" }}>
              <div style={{ fontSize: 12, color: "#fbbf24", fontWeight: 700, marginBottom: 4 }}>💡 How to use</div>
              <div style={{ fontSize: 12, color: "var(--text-secondary)", lineHeight: 1.6 }}>
                1. Save your token above<br/>
                2. <strong>Push</strong> uploads your current library to Gist<br/>
                3. <strong>Pull</strong> downloads from Gist (replaces local)<br/>
                4. Use same token on all devices
              </div>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

function App() {
      const [topics, setTopics] = useState([]);
      const [loading, setLoading] = useState(true);
      const [saveStatus, setSaveStatus] = useState(null);
      const [filterCat, setFilterCat] = useState("الكل");
      const [filterStatus, setFilterStatus] = useState("الكل");
      const [filterPriority, setFilterPriority] = useState("الكل");
      const [activeCategory, setActiveCategory] = useState("الكل");
      const [dragId, setDragId] = useState(null);
      const [dragOverId, setDragOverId] = useState(null);
      const [showFavoritesOnly, setShowFavoritesOnly] = useState(false);
      const [showPublishedOnly, setShowPublishedOnly] = useState(false);
      const [search, setSearch] = useState("");
      const [selectedTopics, setSelectedTopics] = useState([]);
      const [showBulkExport, setShowBulkExport] = useState(false);
      const [showSubtopicForm, setShowSubtopicForm] = useState(false);
      const [showBulkAdd, setShowBulkAdd] = useState(false);
      const [showFabMenu, setShowFabMenu] = useState(false);
      const [showAddToSeries, setShowAddToSeries] = useState(false);
      const [selectedSeriesId, setSelectedSeriesId] = useState(null);
      const [bulkTitles, setBulkTitles] = useState("");
      const [bulkPriority, setBulkPriority] = useState("متوسط");
      const [bulkCategory, setBulkCategory] = useState("نفسي-اجتماعي");
      const [parentTopicId, setParentTopicId] = useState(null);
      const [showForm, setShowForm] = useState(false);
      const [editId, setEditId] = useState(null);
      const [expandedId, setExpandedId] = useState(null);
      const [deleteConfirm, setDeleteConfirm] = useState(null);
      const [toast, setToast] = useState(null);
      const [sortBy, setSortBy] = useState("manual");
      const [showFilters, setShowFilters] = useState(false);
      const [showCategoryManager, setShowCategoryManager] = useState(false);
      const [editingCategory, setEditingCategory] = useState(null);
      const [categoryForm, setCategoryForm] = useState({ name: '', color: '#3b82f6', icon: '📁', matches: [] });
      const [darkMode, setDarkMode] = useState(true);
      const [libraryVersion, setLibraryVersion] = useState(10.03);
      const [lastUpdated, setLastUpdated] = useState(null);
      const [mergeImport, setMergeImport] = useState(false);
      const fileInputRef = useRef(null);

      const emptyForm = {
        title: "", category: "نفسي-اجتماعي", subcategory: "",
        psychologicalAngle: "", psychologicalAnalysis: "",
        coreIdea: "", reelIdea: "", longContentIdea: "",
        cta: "", aiPrompt: "", notes: "",
        tags: [], relatedTopics: [],
        priority: "عالي", status: "فكرة",
        platform: [], audience: "عام",
        isFavorite: false,
        isPublished: false,
        parentId: null,
        isParent: false,
        position: 0  // for ordering within series
      };

      const [form, setForm] = useState({ ...emptyForm });
      const [positionError, setPositionError] = useState("");
      const [formErrors, setFormErrors] = useState({});
      const [tagInput, setTagInput] = useState("");
      const [relatedInput, setRelatedInput] = useState("");

      // Load data on mount
      useEffect(() => {
        const load = () => {
          try {
            const saved = storage.get(STORAGE_KEY);
            const settings = storage.get(SETTINGS_KEY);
            const versionData = storage.get(VERSION_KEY);

            // Check if saved data has enough topics (force reset if < 50)
            const hasEnoughTopics = saved && Array.isArray(saved) && saved.length >= 50;
            const hasCorrectVersion = versionData && versionData.libraryVersion >= 4;

            if (settings?.darkMode !== undefined) setDarkMode(settings.darkMode);

            if (hasEnoughTopics && hasCorrectVersion) {
              // Use saved data
              if (versionData?.libraryVersion) setLibraryVersion(versionData.libraryVersion);
              if (versionData?.lastUpdated) setLastUpdated(versionData.lastUpdated);
              const normalizedTopics = saved.map(t => ({ ...t, isPublished: t.isPublished || false }));
              setTopics(normalizedTopics);
            } else {
              // Force load default topics (60 topics)
              setTopics(defaultTopics);
              storage.set(STORAGE_KEY, defaultTopics);
              const now = new Date().toISOString();
              setLibraryVersion(10.03);
              setLastUpdated(now);
              storage.set(VERSION_KEY, { libraryVersion: 10.00, lastUpdated: now });
              showToast("✅ تم تحميل 60 موضوع جاهزين للاستخدام!");
            }
          } catch {
            setTopics(defaultTopics);
          } finally {
            setTimeout(() => setLoading(false), 400);
          }
        };
        load();
      }, []);

      // Auto-save
      useEffect(() => {
        if (loading) return;
        const timer = setTimeout(() => {
          setSaveStatus("saving");
          const success = storage.set(STORAGE_KEY, topics);
          if (success) {
            setSaveStatus("saved");
            setTimeout(() => setSaveStatus(null), 2000);
          } else {
            setSaveStatus("error");
          }
        }, 500);
        return () => clearTimeout(timer);
      }, [topics, loading]);

      // Theme
      useEffect(() => {
        storage.set(SETTINGS_KEY, { darkMode });
        document.documentElement.setAttribute("data-theme", darkMode ? "dark" : "light");
      }, [darkMode]);

      // Version tracking
      useEffect(() => {
        if (!loading) {
          storage.set(VERSION_KEY, { libraryVersion, lastUpdated });
        }
      }, [libraryVersion, lastUpdated, loading]);

      // Expose current version for Gist sync
      useEffect(() => {
        window.__DR_RAMY_CURRENT_VERSION__ = libraryVersion;
      }, [libraryVersion]);


      // Close FAB menu when clicking outside
      useEffect(() => {
        const handleClickOutside = (e) => {
          if (showFabMenu && !e.target.closest('.fab')) {
            setShowFabMenu(false);
          }
        };
        document.addEventListener('click', handleClickOutside);
        return () => document.removeEventListener('click', handleClickOutside);
      }, [showFabMenu]);

      // Keyboard shortcuts
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.ctrlKey && e.key >= '1' && e.key <= '5') {
            e.preventDefault();
            const groupIndex = parseInt(e.key) - 1;
            if (groupIndex < categoryGroups.length) {
              setActiveCategory(categoryGroups[groupIndex].id);
              setShowFavoritesOnly(false);
              setFilterCat("الكل");
              setExpandedId(null);
              showToast(`تم الانتقال لـ ${categoryGroups[groupIndex].label}`);
            }
          }
          if (e.altKey && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
            e.preventDefault();
            if (!expandedId) return;
            const direction = e.key === 'ArrowUp' ? 'up' : 'down';
            moveTopicInView(expandedId, direction);
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [expandedId, topics, activeCategory, filterCat, filterStatus, filterPriority]);

      const showToast = useCallback((message, type = "success") => {
        setToast({ message, type });
      }, []);

      const updateVersion = useCallback(() => {
        const newVersion = Math.round((libraryVersion + 0.01) * 100) / 100;
        const now = new Date().toISOString();
        setLibraryVersion(newVersion);
        setLastUpdated(now);
      }, [libraryVersion]);

      // Helper: get visible topics based on current filters
      

      // Gist sync pull handler
      const handleSyncPull = useCallback((newTopics) => {
        setTopics(newTopics);
        const newVersion = Math.round((libraryVersion + 0.01) * 100) / 100;
        const now = new Date().toISOString();
        setLibraryVersion(newVersion);
        setLastUpdated(now);
        storage.set(STORAGE_KEY, newTopics);
        storage.set(VERSION_KEY, { libraryVersion: newVersion.toFixed(2), lastUpdated: now });
        showToast(`Synced ${newTopics.length} topics from Gist ✅`);
      }, [libraryVersion]);
const getVisibleTopics = useCallback(() => {
        return topics.filter(t => {
          if (t.parentId) return false;
          if (showFavoritesOnly && !t.isFavorite) return false;
          if (showPublishedOnly && !t.isPublished) return false;
          if (activeCategory !== "الكل") {
            const group = categoryGroups.find(g => g.id === activeCategory);
            if (group && group.matches && !group.matches.includes(t.category)) return false;
          }
          if (filterCat !== "الكل" && t.category !== filterCat) return false;
          if (filterStatus !== "الكل" && t.status !== filterStatus) return false;
          if (filterPriority !== "الكل" && t.priority !== filterPriority) return false;
          if (search) {
            const q = search.toLowerCase();
            return t.title.toLowerCase().includes(q) ||
              (t.notes || "").toLowerCase().includes(q) ||
              t.category.toLowerCase().includes(q) ||
              (t.psychologicalAngle || "").toLowerCase().includes(q) ||
              (t.tags || []).some(tag => tag.toLowerCase().includes(q));
          }
          return true;
        });
      }, [topics, showFavoritesOnly, activeCategory, filterCat, filterStatus, filterPriority, search]);

      const filtered = getVisibleTopics();

      const sorted = (() => {
        let items = [...filtered];
        if (sortBy === "manual") {
          // Manual sort - keep array order
        } else if (sortBy === "newest") {
          items.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        } else if (sortBy === "priority") {
          const pMap = { "عالي": 3, "متوسط": 2, "منخفض": 1 };
          items.sort((a, b) => pMap[b.priority] - pMap[a.priority]);
        } else if (sortBy === "title") {
          items.sort((a, b) => a.title.localeCompare(b.title, "ar"));
        }
        return items;
      })();

      const statusCount = {
        "منشور": topics.filter(t => t.status === "منشور").length,
        "مجدول": topics.filter(t => t.status === "مجدول").length,
        "فكرة": topics.filter(t => t.status === "فكرة").length
      };

      const catCount = cat => cat === "الكل" ? topics.length : topics.filter(t => t.category === cat).length;

      const groupCount = (groupId) => {
        if (groupId === "الكل") return topics.length;
        const group = categoryGroups.find(g => g.id === groupId);
        if (!group || !group.matches) return 0;
        return topics.filter(t => group.matches.includes(t.category)).length;
      };

      const favoritesCount = () => topics.filter(t => t.isFavorite).length;
      const publishedCount = () => topics.filter(t => t.isPublished).length;
      const statCount = s => s === "الكل" ? topics.length : topics.filter(t => t.status === s).length;
      const priorityCount = p => p === "الكل" ? topics.length : topics.filter(t => t.priority === p).length;

      const hasActiveFilters = showFavoritesOnly || showPublishedOnly || activeCategory !== "الكل" || filterCat !== "الكل" || filterStatus !== "الكل" || filterPriority !== "الكل" || search;

      const clearFilters = () => {
        setShowFavoritesOnly(false);
        setShowPublishedOnly(false);
        setActiveCategory("الكل");
        setFilterCat("الكل");
        setFilterStatus("الكل");
        setFilterPriority("الكل");
        setSearch("");
      };

      const moveTopicGlobal = (fromIndex, toIndex) => {
        if (toIndex < 0 || toIndex >= topics.length) return;
        const newTopics = [...topics];
        const [moved] = newTopics.splice(fromIndex, 1);
        newTopics.splice(toIndex, 0, moved);
        setTopics(newTopics);
        updateVersion();
        showToast("تم تغيير الترتيب ✅");
      };

      const moveTopicInView = (topicId, direction) => {
        const visibleTopics = getVisibleTopics();
        const currentIndex = visibleTopics.findIndex(t => t.id === topicId);
        if (currentIndex === -1) return;
        const newIndex = direction === 'up' ? currentIndex - 1 : currentIndex + 1;
        if (newIndex < 0 || newIndex >= visibleTopics.length) return;
        const fromGlobalIndex = topics.findIndex(t => t.id === topicId);
        const toGlobalIndex = topics.findIndex(t => t.id === visibleTopics[newIndex].id);
        if (fromGlobalIndex !== -1 && toGlobalIndex !== -1) {
          moveTopicGlobal(fromGlobalIndex, toGlobalIndex);
        }
      };

      const moveUp = (topicId) => moveTopicInView(topicId, 'up');
      const moveDown = (topicId) => moveTopicInView(topicId, 'down');

      const toggleFavorite = (topicId) => {
        const topic = topics.find(t => t.id === topicId);
        setTopics(topics.map(t => t.id === topicId ? { ...t, isFavorite: !t.isFavorite } : t));
        updateVersion();
        if (topic) {
          showToast(topic.isFavorite ? "تم الإزالة من المفضلة 💔" : "تمت الإضافة للمفضلة ⭐");
        }
      };

      const togglePublished = (topicId) => {
        const topic = topics.find(t => t.id === topicId);
        setTopics(topics.map(t => t.id === topicId ? { ...t, isPublished: !t.isPublished } : t));
        updateVersion();
        if (topic) {
          showToast(topic.isPublished ? "تم الإزالة من المنشورات ❌" : "تمت الإضافة للمنشورات ✅");
        }
      };

      // Subtopic helpers
      const getSubtopics = (parentId) => {
        return topics.filter(t => t.parentId === parentId).sort((a, b) => {
          return (a.position || 0) - (b.position || 0);
        });
      };

      const isParentTopic = (topicId) => {
        const topic = topics.find(t => t.id === topicId);
        return topic && (topic.isParent || topics.some(t => t.parentId === topicId));
      };

      const hasParent = (topic) => {
        return topic && topic.parentId !== null && topic.parentId !== undefined;
      };

      const getParent = (topic) => {
        if (!topic || !topic.parentId) return null;
        return topics.find(t => t.id === topic.parentId);
      };

      const moveSubtopic = (subtopicId, direction, currentIndex, totalSiblings) => {
        const sub = topics.find(t => t.id === subtopicId);
        if (!sub || !sub.parentId) return;

        const newIndex = direction === 'up' ? currentIndex - 1 : currentIndex + 1;
        if (newIndex < 0 || newIndex >= totalSiblings) return;

        const siblings = getSubtopics(sub.parentId);
        const sibling = siblings[newIndex];
        if (!sibling) return;

        // Swap positions
        const currentPos = sub.position || currentIndex;
        const siblingPos = sibling.position || newIndex;

        setTopics(prev => prev.map(t => {
          if (t.id === subtopicId) return { ...t, position: siblingPos, updatedAt: new Date().toISOString() };
          if (t.id === sibling.id) return { ...t, position: currentPos, updatedAt: new Date().toISOString() };
          return t;
        }));
        updateVersion();
        showToast(direction === 'up' ? "تم الترتيب للأعلى ✅" : "تم الترتيب للأسفل ✅");
      };

      const addToExistingSeries = (topicId, seriesId) => {
        const topic = topics.find(t => t.id === topicId);
        const series = topics.find(t => t.id === seriesId);
        if (!topic || !series) return;
        setTopics(topics.map(t => t.id === topicId ? { ...t, parentId: seriesId, updatedAt: new Date().toISOString() } : t));
        updateVersion();
        showToast(`"${topic.title}" بقى جزء من "${series.title}" ✅`);
        setShowAddToSeries(false);
        setSelectedSeriesId(null);
        setExpandedId(null);
      };

      const convertToSeries = (topicId) => {
        const topic = topics.find(t => t.id === topicId);
        if (!topic) return;
        setTopics(topics.map(t => t.id === topicId ? { ...t, isParent: true, parentId: null } : t));
        updateVersion();

        const groupIndex = categoryGroups.findIndex(g => g.id === oldId);

        const oldGroup = categoryGroups[groupIndex];
        const newId = newData.name.trim();

        // Update categoryGroups
        categoryGroups[groupIndex] = {
          ...oldGroup,
          id: newId,
          label: newData.name.trim(),
          icon: newData.icon || oldGroup.icon,
          color: newData.color || oldGroup.color,
          description: newData.description || oldGroup.description,
          matches: newData.matches.length > 0 ? newData.matches : [newId]
        };

        // Update categories array
        const catIndex = categories.indexOf(oldId);
        if (catIndex !== -1) {
          categories[catIndex] = newId;
        }

        // Update all topics that use this category
        if (oldId !== newId) {
          setTopics(topics.map(t => {
            if (t.category === oldId) {
              return { ...t, category: newId, updatedAt: new Date().toISOString() };
            }
            return t;
          }));

        setEditingCategory(null);
        setCategoryForm({ name: '', color: '#3b82f6', icon: '📁', matches: [], description: '' });

          return;

          categories.splice(catIndex, 1);
        }

        // Reset filter if this category was selected
        if (activeCategory === catId) {

                  <input className="input" value={form.cta} onChange={e => setForm(f => ({ ...f, cta: e.target.value }))} placeholder="مثال: شاركنا في التعليقات..." />
                </div>

                <div className="section-title">🤖 أدوات الذكاء الاصطناعي</div>

                <div className="form-group">
                  <label className="form-label">AI Prompt</label>
                  <textarea className="input" rows={3} value={form.aiPrompt} onChange={e => setForm(f => ({ ...f, aiPrompt: e.target.value }))} placeholder="اكتب Prompt جاهز للصق في ChatGPT أو Claude..." style={{ borderRight: "3px solid #a855f7" }} />
                </div>

                <div className="section-title">🏷️ التنظيم</div>

                <div className="form-group">
                  <label className="form-label">الوسوم (Tags)</label>
                  <div style={{ display: "flex", flexWrap: "wrap", marginBottom: 8 }}>
                    {form.tags.map(tag => (
                      <span key={tag} className="tag-item">
                        {tag} <button onClick={() => removeTag(tag)}>×</button>
                      </span>
                    ))}
                  </div>
                  <div className="tag-input-row">
                    <input className="input" value={tagInput} onChange={e => setTagInput(e.target.value)} placeholder="أضف وسم..." onKeyPress={e => e.key === 'Enter' && addTag()} />
                    <button className="btn btn-secondary" onClick={addTag}>إضافة</button>
                  </div>
                </div>

                <div className="form-group">
                  <label className="form-label">مواضيع مرتبطة</label>
                  <div style={{ display: "flex", flexWrap: "wrap", marginBottom: 8 }}>
                    {form.relatedTopics.map(rt => (
                      <span key={rt} className="tag-item" style={{ background: "rgba(59,130,246,0.1)", color: "var(--accent-light)" }}>
                        {rt} <button onClick={() => removeRelated(rt)}>×</button>
                      </span>
                    ))}
                  </div>
                  <div className="tag-input-row">
                    <input className="input" value={relatedInput} onChange={e => setRelatedInput(e.target.value)} placeholder="أضف موضوع مرتبط..." onKeyPress={e => e.key === 'Enter' && addRelated()} />
                    <button className="btn btn-secondary" onClick={addRelated}>إضافة</button>
                  </div>
                </div>

                <div className="form-group">
                  <label className="form-label">ملاحظات</label>
                  <textarea className="input" rows={3} value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} placeholder="أي ملاحظات عن الزاوية أو الجمهور المستهدف..." />
                </div>

                <div className="form-group">
                  <label className="form-label">المفضلة ⭐</label>
                  <button
                    type="button"
                    className="btn"
                    onClick={() => setForm(f => ({ ...f, isFavorite: !f.isFavorite }))}
                    style={{
                      background: form.isFavorite ? 'rgba(251, 191, 36, 0.15)' : 'var(--bg-tertiary)',
                      color: form.isFavorite ? '#fbbf24' : 'var(--text-secondary)',
                      border: form.isFavorite ? '1.5px solid #fbbf24' : '1.5px solid var(--border)',
                      fontSize: 16,
                      gap: 8
                    }}
                  >
                    {form.isFavorite ? '⭐ في المفضلة' : '☆ أضف للمفضلة'}
                  </button>
                </div>

                <div className="form-group">
                  <label className="form-label">المنشورات ✅</label>
                  <button
                    type="button"
                    className="btn"
                    onClick={() => setForm(f => ({ ...f, isPublished: !f.isPublished }))}
                    style={{
                      background: form.isPublished ? 'rgba(16, 185, 129, 0.15)' : 'var(--bg-tertiary)',
                      color: form.isPublished ? '#10b981' : 'var(--text-secondary)',
                      border: form.isPublished ? '1.5px solid #10b981' : '1.5px solid var(--border)',
                      fontSize: 16,
                      gap: 8
                    }}
                  >
                    {form.isPublished ? '✅ في المنشورات' : '☐ أضف للمنشورات'}
                  </button>
                </div>

                <div style={{ display: "flex", gap: 10, position: "sticky", bottom: 0, background: "var(--bg-card)", paddingTop: 8 }}>
                  <button className="btn btn-primary" style={{ flex: 1, fontSize: 15 }} onClick={handleSave}>
                    {editId ? "💾 حفظ التعديلات" : "➕ إضافة الموضوع"}
                  </button>
                  <button className="btn btn-secondary" onClick={() => setShowForm(false)}>إلغاء</button>
                </div>
              </div>
            </div>
          )}

          {/* Confirm Dialog */}
          {deleteConfirm && (
            <ConfirmDialog
              title="🗑️ تأكيد الحذف"
              message="هل أنت متأكد أنك تريد حذف هذا الموضوع؟ لا يمكن التراجع عن هذا الإجراء."
              onConfirm={() => handleDelete(deleteConfirm)}
              onCancel={() => setDeleteConfirm(null)}
            />
          )}

          {/* Toast */}
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
